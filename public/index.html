<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Consorzio FASATrasporti</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body data-page="dashboard">
    <main class="page">
        <header class="topbar">
            <div>
                <h1 data-company-name>Societ&agrave;</h1>
                <p data-company-email></p>
            </div>
            <div class="topbar-actions">
                <div class="notification-wrapper" data-notifications>
                    <button class="icon-btn notification-button" type="button" data-open-notifications title="Notifiche" aria-label="Apri notifiche" aria-expanded="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 21a1.9 1.9 0 0 0 3.4 0"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/></svg>
                        <span class="notification-count" data-notification-count hidden></span>
                    </button>
                    <div class="notification-panel" data-notification-panel aria-hidden="true">
                        <div class="notification-panel-head">
                            <strong>Notifiche</strong>
                            <button class="mini-action" type="button" data-refresh-notifications>Aggiorna</button>
                        </div>
                        <div class="notification-list" data-notification-list></div>
                    </div>
                </div>
                <button class="icon-btn" type="button" data-open-profile title="Profilo societ&agrave;" aria-label="Apri profilo societ&agrave;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <button class="btn secondary" type="button" data-logout data-loading-text="Uscita...">
                    <span class="btn-content">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                        Esci
                    </span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>
            </div>
        </header>

        <div class="alert" data-alert></div>

        <section class="dashboard-summary" data-dashboard-summary></section>

        <section class="deadline-panel">
            <div class="section-head compact">
                <h2>Scadenze in evidenza</h2>
            </div>
            <div class="deadline-list" data-expiring-documents></div>
        </section>

        <section>
            <div class="section-head">
                <h2>Documenti societ&agrave;</h2>
            </div>
            <div class="filter-tabs" data-document-filters>
                <button class="filter-chip is-active" type="button" data-document-filter="all">Tutti</button>
                <button class="filter-chip" type="button" data-document-filter="missing">Mancanti</button>
                <button class="filter-chip" type="button" data-document-filter="pending">In attesa</button>
                <button class="filter-chip" type="button" data-document-filter="approved">Approvati</button>
                <button class="filter-chip" type="button" data-document-filter="rejected">Respinti</button>
                <button class="filter-chip" type="button" data-document-filter="expiring">In scadenza</button>
            </div>
            <div class="document-list" data-company-documents></div>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Navigazione principale">
        <a class="is-active" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h.01"/><path d="M9 13h.01"/><path d="M9 17h.01"/></svg>
            Societ&agrave;
        </a>
        <a href="dipendenti.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Dipendenti
        </a>
        <a href="veicoli.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 17h4V5H2v12h3"/><path d="M14 17h1"/><path d="M14 9h4l4 4v4h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
            Veicoli
        </a>
    </nav>

    <aside class="profile-drawer-backdrop" data-profile-drawer aria-hidden="true">
        <section class="profile-drawer" aria-label="Profilo societ&agrave;">
            <div class="profile-drawer-head">
                <div>
                    <h2>Profilo societ&agrave;</h2>
                    <p data-company-email></p>
                </div>
                <button class="close-btn" type="button" data-close-profile aria-label="Chiudi profilo">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <div class="profile-drawer-body">
                <form class="profile-form" data-profile-form>
                    <div class="field">
                        <label>Ragione sociale</label>
                        <input class="input" name="name" type="text" required>
                    </div>
                    <div class="field">
                        <label>Responsabile</label>
                        <input class="input" name="responsible_name" type="text">
                    </div>
                    <div class="field">
                        <label>Partita IVA</label>
                        <input class="input" name="vat_number" type="text">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input class="input" name="email" type="email" required>
                    </div>
                    <button class="btn secondary" type="submit" data-loading-text="Salvataggio...">
                        <span class="btn-content">Salva profilo</span>
                        <span class="btn-loader" aria-hidden="true"></span>
                    </button>
                </form>

                <form class="password-change-form" data-profile-password-form>
                    <h3>Password</h3>
                    <div class="field">
                        <label>Password attuale</label>
                        <div class="password-field">
                            <input class="input" id="profile_current_password" name="current_password" type="password" autocomplete="current-password" required>
                            <button class="password-toggle" type="button" data-toggle-password="profile_current_password" aria-label="Mostra password" title="Mostra password">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"/><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"/><path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-3.2 4.2"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a10.4 10.4 0 0 0 5.4-1.5"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-label-row">
                            <label>Nuova password</label>
                            <button class="mini-action" type="button" data-generate-password>Genera</button>
                        </div>
                        <div class="password-field">
                            <input class="input" id="profile_password" name="password" type="password" autocomplete="new-password" required data-password-input>
                            <button class="password-toggle" type="button" data-toggle-password="profile_password" aria-label="Mostra password" title="Mostra password">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"/><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"/><path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-3.2 4.2"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a10.4 10.4 0 0 0 5.4-1.5"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Conferma password</label>
                        <div class="password-field">
                            <input class="input" id="profile_password_confirmation" name="password_confirmation" type="password" autocomplete="new-password" required data-password-confirmation>
                            <button class="password-toggle" type="button" data-toggle-password="profile_password_confirmation" aria-label="Mostra password" title="Mostra password">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"/><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"/><path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-3.2 4.2"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a10.4 10.4 0 0 0 5.4-1.5"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="password-advisor" data-password-advisor>
                        <div class="password-meter" aria-hidden="true"><span data-password-meter></span></div>
                        <ul class="password-rules">
                            <li data-password-rule="length">Almeno 8 caratteri</li>
                            <li data-password-rule="lower">Una lettera minuscola</li>
                            <li data-password-rule="upper">Una lettera maiuscola</li>
                            <li data-password-rule="number">Un numero</li>
                            <li data-password-rule="match">Le password coincidono</li>
                        </ul>
                    </div>
                    <button class="btn secondary" type="submit" data-loading-text="Aggiornamento...">
                        <span class="btn-content">Aggiorna password</span>
                        <span class="btn-loader" aria-hidden="true"></span>
                    </button>
                </form>
            </div>
        </section>
    </aside>
</body>
</html>
