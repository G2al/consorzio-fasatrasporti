<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accesso | Consorzio FASATrasporti</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="auth-page" data-page="login">
    <main class="auth-shell">
        <section class="auth-copy" aria-labelledby="login-title">
            <div class="auth-copy-inner">
                <img class="auth-logo" src="images/logo_white_fasa.svg" alt="FASATrasporti">
                <p class="auth-eyebrow">Area societ&agrave;</p>
                <h1 id="login-title">Portale documentale</h1>
                <p>Accedi per controllare documenti, stati di approvazione e scadenze della tua societ&agrave;.</p>
                <div class="auth-feature-list" aria-label="Funzioni principali">
                    <span>Carica documenti</span>
                    <span>Monitora scadenze</span>
                    <span>Consulta esiti</span>
                </div>
            </div>
        </section>

        <section class="auth-panel" aria-label="Accesso societ&agrave;">
            <div class="brand">
                <div class="brand-text">
                    <div class="brand-title">Accedi al portale</div>
                    <div class="brand-subtitle">Usa le credenziali della tua societ&agrave;</div>
                </div>
            </div>

            <div class="alert" data-alert></div>

            <form data-login-form>
                <div class="field">
                    <label for="email">Email</label>
                    <input class="input" id="email" name="email" type="email" autocomplete="email" required>
                </div>

                <div class="field form-gap">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
                        <button class="password-toggle" type="button" data-toggle-password="password" aria-label="Mostra password" title="Mostra password">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"/><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"/><path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-3.2 4.2"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a10.4 10.4 0 0 0 5.4-1.5"/></svg>
                        </button>
                    </div>
                </div>

                <label class="check-row form-gap">
                    <input type="checkbox" name="remember" checked>
                    <span>Ricordami su questo dispositivo</span>
                </label>

                <button class="btn auth-submit" type="submit" data-loading-text="Accesso in corso...">
                    <span class="btn-content">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
                        Accedi
                    </span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>
            </form>

            <div class="link-row">
                <span>Nuova societ&agrave;</span>
                <a href="register.html">Registrati</a>
            </div>
        </section>
    </main>
</body>
</html>
